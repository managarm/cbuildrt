name: CI

on: [push, pull_request]

jobs:
    build:
        name: Build cbuildrt
        runs-on: ubuntu-24.04
        steps:
          - name: Install prerequisites
            run: |
                sudo apt-get update
                sudo apt-get install -y musl-tools
                rustup target add x86_64-unknown-linux-musl
          - name: Checkout
            uses: actions/checkout@v2
          - name: Build using Cargo
            env:
                CC_x86_64_unknown_linux_musl: musl-gcc
                CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
            run: |
                cargo build --release --target x86_64-unknown-linux-musl
          - name: Publish artifact
            uses: actions/upload-artifact@v4
            with:
                name: cbuildrt-linux-x86_64
                path: target/x86_64-unknown-linux-musl/release/cbuildrt

    test:
        name: Test cbuildrt
        runs-on: ubuntu-24.04
        steps:
          - name: Checkout
            uses: actions/checkout@v2
          - name: Allow unprivileged user namespaces
            run: |
                sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
                sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          - name: Run cargo test
            run: |
                cargo test

    deploy:
        name: Publish release
        runs-on: ubuntu-24.04
        if: "startsWith(github.ref, 'refs/tags/v')"
        needs: build
        steps:
          - name: Fetch artifact
            uses: actions/download-artifact@v4
            with:
                name: cbuildrt-linux-x86_64
                path: linux-x86_64
          - name: Prepare assets
            run: |
                chmod +x linux-x86_64/cbuildrt
                tar -cf cbuildrt-linux-x86_64-static.tar -C linux-x86_64 cbuildrt
          - name: Do release
            uses: softprops/action-gh-release@v1
            with:
                files: |
                    cbuildrt-linux-x86_64-static.tar
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
